name: Oriel
options:
  bundleIdPrefix: net.inveil
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  SWIFT_VERSION: "5.10"
  BASE_SDK: ""
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "44"

schemes:
  Oriel:
    build:
      targets:
        Oriel: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - OrielTests
        - OrielUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  Oriel:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Sources
        excludes:
          - "ThirdParty/ZIPFoundation/LICENSE"
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/ContentBlocker
        buildPhase: resources
        includes:
          - "**/*.json"
    entitlements:
      path: Oriel.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.downloads.read-write: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.device.camera: true
        com.apple.security.device.microphone: true
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)$(CFBundleIdentifier)
    info:
      path: Resources/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleTypeRole: Viewer
            CFBundleURLName: net.inveil.oriel.web
            CFBundleURLSchemes:
              - http
              - https
            LSHandlerRank: Owner
        CFBundleDocumentTypes:
          - CFBundleTypeName: HTML document
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.html
              - public.xhtml
          - CFBundleTypeName: URL
            CFBundleTypeRole: Viewer
            LSHandlerRank: Owner
            LSItemContentTypes:
              - public.url
              - public.url-book
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: net.inveil.oriel
      PRODUCT_NAME: Oriel
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "44"
      DEVELOPMENT_TEAM: 2PP6UH4PWA
      CODE_SIGN_STYLE: Automatic
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_CFBundleDisplayName: Oriel
      INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
      INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © inveil.net"
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
      INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
      INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
      INFOPLIST_KEY_NSCameraUsageDescription: "Oriel needs camera access when a website requests it."
      INFOPLIST_KEY_NSMicrophoneUsageDescription: "Oriel needs microphone access when a website requests it."
      INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Oriel needs location access when a website requests it."
      INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
      TARGETED_DEVICE_FAMILY: "1,2"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ENABLE_PREVIEWS: YES
      SWIFT_STRICT_CONCURRENCY: targeted

  OrielTests:
    type: bundle.unit-test
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Tests/OrielTests
    dependencies:
      - target: Oriel
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: net.inveil.oriel.tests
      GENERATE_INFOPLIST_FILE: YES
      DEVELOPMENT_TEAM: 2PP6UH4PWA
      CODE_SIGN_STYLE: Automatic
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Oriel.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Oriel"
      BUNDLE_LOADER: "$(TEST_HOST)"

  OrielUITests:
    type: bundle.ui-testing
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Tests/OrielUITests
    dependencies:
      - target: Oriel
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: net.inveil.oriel.uitests
      GENERATE_INFOPLIST_FILE: YES
      DEVELOPMENT_TEAM: 2PP6UH4PWA
      CODE_SIGN_STYLE: Automatic
