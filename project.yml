name: Oriel
options:
  bundleIdPrefix: net.inveil
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  SWIFT_VERSION: "5.10"
  BASE_SDK: ""
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "73"

schemes:
  Oriel:
    build:
      targets:
        Oriel: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - OrielTests
        - OrielUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  Oriel:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Sources
        excludes:
          - "ThirdParty/ZIPFoundation/LICENSE"
          # Mac Oriel Engine helpers are compiled by Scripts/build-oriel-engine-macos.sh
          - "CEF/Helper/**"
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/AlternateIcons
        buildPhase: resources
      - path: Resources/ContentBlocker
        buildPhase: resources
        includes:
          - "**/*.json"
    entitlements:
      path: Oriel.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.downloads.read-write: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.device.camera: true
        com.apple.security.device.microphone: true
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)$(CFBundleIdentifier)
    info:
      path: Resources/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleTypeRole: Viewer
            CFBundleURLName: net.inveil.oriel.web
            CFBundleURLSchemes:
              - http
              - https
            LSHandlerRank: Owner
        CFBundleDocumentTypes:
          - CFBundleTypeName: HTML document
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.html
              - public.xhtml
          - CFBundleTypeName: URL
            CFBundleTypeRole: Viewer
            LSHandlerRank: Owner
            LSItemContentTypes:
              - public.url
              - public.url-book
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: net.inveil.oriel
      PRODUCT_NAME: Oriel
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "73"
      DEVELOPMENT_TEAM: 2PP6UH4PWA
      CODE_SIGN_STYLE: Automatic
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_CFBundleDisplayName: Oriel
      INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
      INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © inveil.net"
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
      INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
      INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
      INFOPLIST_KEY_NSCameraUsageDescription: "Oriel needs camera access when a website requests it."
      INFOPLIST_KEY_NSMicrophoneUsageDescription: "Oriel needs microphone access when a website requests it."
      INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Oriel needs location access when a website requests it."
      INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
      INFOPLIST_KEY_LSSupportsOpeningDocumentsInPlace: YES
      TARGETED_DEVICE_FAMILY: "1,2"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
      ENABLE_PREVIEWS: YES
      SWIFT_STRICT_CONCURRENCY: targeted
      SWIFT_OBJC_BRIDGING_HEADER: Sources/CEF/Oriel-Bridging-Header.h
      CLANG_CXX_LANGUAGE_STANDARD: c++17
      CLANG_ENABLE_OBJC_ARC: YES
      # Mac Oriel Engine (CEF/Blink) — requires Scripts/enable-cef-macos.sh once.
      "SWIFT_ACTIVE_COMPILATION_CONDITIONS[sdk=macosx*]": "$(inherited) ORIEL_HAS_CEF"
      "OTHER_SWIFT_FLAGS[sdk=macosx*]": "$(inherited) -DORIEL_HAS_CEF"
      "OTHER_CFLAGS[sdk=macosx*]": "$(inherited) -DORIEL_HAS_CEF=1 -Wno-comma"
      "OTHER_CPLUSPLUSFLAGS[sdk=macosx*]": "$(inherited) -DORIEL_HAS_CEF=1 -std=c++17 -Wno-comma"
      "HEADER_SEARCH_PATHS[sdk=macosx*]": "$(inherited) $(SRCROOT)/Vendor/CEF"
      "LIBRARY_SEARCH_PATHS[sdk=macosx*]": "$(inherited) $(SRCROOT)/build/oriel-engine"
      "OTHER_LDFLAGS[sdk=macosx*]": "$(inherited) -lcef_dll_wrapper -lc++ -framework AppKit -framework CoreFoundation"
      "LD_RUNPATH_SEARCH_PATHS[sdk=macosx*]": "$(inherited) @executable_path/../Frameworks @loader_path/../Frameworks"
      "CODE_SIGN_ENTITLEMENTS[sdk=macosx*]": Resources/Oriel-macOS-Engine.entitlements
    postCompileScripts:
      - name: Embed Oriel Engine (macOS)
        script: |
          /bin/bash "${SRCROOT}/Scripts/xcode-embed-oriel-engine.sh"
        basedOnDependencyAnalysis: false

  OrielTests:
    type: bundle.unit-test
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Tests/OrielTests
    dependencies:
      - target: Oriel
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: net.inveil.oriel.tests
      GENERATE_INFOPLIST_FILE: YES
      DEVELOPMENT_TEAM: 2PP6UH4PWA
      CODE_SIGN_STYLE: Automatic
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Oriel.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Oriel"
      BUNDLE_LOADER: "$(TEST_HOST)"

  OrielUITests:
    type: bundle.ui-testing
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Tests/OrielUITests
    dependencies:
      - target: Oriel
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: net.inveil.oriel.uitests
      GENERATE_INFOPLIST_FILE: YES
      DEVELOPMENT_TEAM: 2PP6UH4PWA
      CODE_SIGN_STYLE: Automatic
