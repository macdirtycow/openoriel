name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or refresh (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  macos-dmg:
    name: Build macOS DMG
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Resolve version
        id: version
        run: |
          MARKETING="$(grep -E '^\s*MARKETING_VERSION:' project.yml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          BUILD="$(grep -E '^\s*CURRENT_PROJECT_VERSION:' project.yml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          echo "marketing=$MARKETING" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build DMG
        run: bash Scripts/make-macos-dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Oriel-macOS-DMG
          path: |
            build/dmg/*.dmg
            build/dmg/*.sha256
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Oriel ${{ steps.version.outputs.marketing }} (${{ steps.version.outputs.build }})
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## Install (macOS)

            1. Download **Oriel-${{ steps.version.outputs.marketing }}-${{ steps.version.outputs.build }}-macOS.dmg**
            2. Open the DMG and drag **Oriel** into **Applications**
            3. First launch: right-click Oriel → **Open** (ad-hoc signed build; Gatekeeper may warn once)

            Website: https://openoriel.com  
            Bundle ID: `net.inveil.oriel`

            ### Checksum

            See the attached `.sha256` file (SHA-256 of the DMG).
          files: |
            build/dmg/*.dmg
            build/dmg/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
