name: Build unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [main, "cursor/**"]
    paths:
      - "Sources/**"
      - "Resources/**"
      - "project.yml"
      - "Scripts/make-unsigned-ipa.sh"
      - ".github/workflows/build-ipa.yml"

permissions:
  contents: read

concurrency:
  group: build-ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ipa:
    name: Unsigned iOS IPA
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          # Prefer newest installed Xcode that can build iOS.
          for app in \
            /Applications/Xcode_16.4.app \
            /Applications/Xcode_16.3.app \
            /Applications/Xcode_16.2.app \
            /Applications/Xcode.app
          do
            if [[ -d "$app" ]]; then
              sudo xcode-select -s "$app/Contents/Developer"
              break
            fi
          done
          xcodebuild -version
          echo "Available SDKs:"
          xcodebuild -showsdks || true

      - name: Install iOS platform
        run: |
          set -euo pipefail
          # GitHub images often ship Xcode without the iOS device SDK preinstalled.
          if xcodebuild -showsdks 2>/dev/null | grep -q 'iphoneos'; then
            echo "iOS SDK already present"
          else
            echo "Downloading iOS platform…"
            xcodebuild -downloadPlatform iOS
          fi
          xcodebuild -showsdks | grep -E 'iphoneos|iOS' || true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build unsigned IPA
        run: bash Scripts/make-unsigned-ipa.sh

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Oriel-unsigned-ipa
          path: |
            build/ipa/*.ipa
          if-no-files-found: error
          retention-days: 14
